  <script>
    (() => {
      const urlLang = new URLSearchParams(location.search).get('lang');
      const urlCountry = new URLSearchParams(location.search).get('country');
      let currentLang = (urlLang && ['en','uk','es'].includes(urlLang)) ? urlLang : (localStorage.getItem('hdr_lang') || 'en');
      let currentCountry = (urlCountry && ['uk','ua','es'].includes(urlCountry)) ? urlCountry : (localStorage.getItem('hdr_ma_country') || 'uk');

      const t = (key) => {
        if (typeof I18N !== 'undefined' && I18N[currentLang] && key in I18N[currentLang])
          return I18N[currentLang][key];
        const countryData = typeof MA_DATA !== 'undefined' && MA_DATA[currentCountry];
        const langData = countryData && (countryData[currentLang] || countryData.en);
        if (langData && key in langData)
          return langData[key];
        return I18N?.en?.[key] || (countryData?.en && countryData.en[key]) || key;
      };

      const setURL = () => {
        const u = new URL(location);
        if (currentLang === 'en') u.searchParams.delete('lang');
        else u.searchParams.set('lang', currentLang);
        if (currentCountry === 'uk') u.searchParams.delete('country');
        else u.searchParams.set('country', currentCountry);
        history.replaceState(null, '', u);
      };

      const activate = () => {
        localStorage.setItem('hdr_lang', currentLang);
        localStorage.setItem('hdr_ma_country', currentCountry);
        setURL();
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
        const countrySelect = document.getElementById('countrySelect');
        if (countrySelect) countrySelect.value = currentCountry;
        const back = document.getElementById('maBack');
        if (back) back.href = currentLang === 'en' ? 'index.html' : 'index.html?lang=' + currentLang;
        const logo = document.getElementById('maLogo');
        if (logo) logo.href = currentLang === 'en' ? 'index.html' : 'index.html?lang=' + currentLang;
        const backText = document.getElementById('maBackText');
        if (backText) backText.textContent = t('ma_back');
        const title = document.getElementById('maTitle');
        if (title) title.textContent = t('ma_title');
        document.title = 'HotDesk Rail — ' + t('ma_title');
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.dataset.i18n;
          const val = t(key);
          if (val != null && val !== key) el.textContent = val;
        });
      };

      activate();

      document.getElementById('langSwitcher').addEventListener('click', (e) => {
        const btn = e.target.closest('.lang-btn');
        if (btn && btn.dataset.lang) { currentLang = btn.dataset.lang; activate(); }
      });

      document.getElementById('countrySelect').addEventListener('change', (e) => {
        if (e.target.value) { currentCountry = e.target.value; activate(); }
      });

      const THEMES = ['light', 'dark', 'auto'];
      const applyTheme = (theme) => {
        localStorage.setItem('hdr_theme', theme);
        if (theme === 'auto') {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
          document.documentElement.style.colorScheme = prefersDark ? 'dark' : 'light';
        } else {
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        }
      };

      const themeBtn = document.getElementById('themeToggle');
      let themeIdx = THEMES.indexOf(localStorage.getItem('hdr_theme') || 'light');
      if (themeIdx < 0) themeIdx = 0;
      applyTheme(THEMES[themeIdx]);

      themeBtn.addEventListener('click', () => {
        themeIdx = (themeIdx + 1) % THEMES.length;
        applyTheme(THEMES[themeIdx]);
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (THEMES[themeIdx] === 'auto') applyTheme('auto');
      });
    })();
  </script>
